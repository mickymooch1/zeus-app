[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "ANTHROPIC_API_KEY=${{Variable.ANTHROPIC_API_KEY}} uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level debug"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
