[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'ANTHROPIC_API_KEY=PASTE_NEW_KEY_HERE uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level debug'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3